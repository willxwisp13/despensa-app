<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Despensa Inteligente</title>
  <link rel="manifest" href="https://despensa-app.willxwisp13.workers.dev/manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="apple-touch-icon" href="https://despensa-app.willxwisp13.workers.dev/icons/icon-192.png">
</head>
<body>
  <div class="app">
    <!-- Header con cámara -->
    <div class="header">
      <div class="header-left">
        <h1>📦 Mi Despensa</h1>
        <span id="despensaActivaNombre" class="despensa-activa"></span>
      </div>
      <button id="btnModoEscaneo" class="btn-scan-header">📷</button>
    </div>

    <!-- Pestañas -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="productos">📦 Productos</button>
      <button class="tab-btn" data-tab="despensas">🏠 Despensas</button>
      <button class="tab-btn" data-tab="perfil">👤 Perfil</button>
    </div>

    <!-- ===== CONTENIDO PESTAÑA PRODUCTOS ===== -->
    <div id="tab-productos" class="tab-content active">
      <!-- Estadísticas rápidas -->
      <div class="stats">
        <div class="stat-card">
          <span class="stat-number" id="totalProductos">0</span>
          <span class="stat-label">Productos</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="productosCriticos">0</span>
          <span class="stat-label">Stock bajo</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="porCaducar">0</span>
          <span class="stat-label">Por caducar</span>
        </div>
      </div>

      <!-- Buscador -->
      <div class="search-box">
        <input type="text" id="buscador" placeholder="🔍 Buscar producto...">
      </div>

      <!-- Lista de productos -->
      <div class="product-list" id="productList"></div>
    </div>

    <!-- ===== CONTENIDO PESTAÑA DESPENSAS ===== -->
    <div id="tab-despensas" class="tab-content">
      <div class="despensas-header">
        <h3>🏠 Mis Despensas</h3>
        <div class="despensas-buttons">
          <button id="btnCrearDespensa" class="btn-secondary">➕ Crear</button>
          <button id="btnUnirseDespensa" class="btn-secondary">🔗 Unirse</button>
        </div>
      </div>
      <div id="listaDespensas" class="lista-despensas">
        <!-- Aquí se cargarán las despensas -->
      </div>
    </div>

    <!-- ===== CONTENIDO PESTAÑA PERFIL ===== -->
    <div id="tab-perfil" class="tab-content">
      <div class="perfil-card">
        <div class="perfil-avatar">👤</div>
        <h3 id="perfilEmail">cargando...</h3>
        <p id="perfilRol" class="perfil-rol"></p>
        <hr>
        <div class="perfil-opciones">
          <button id="btnExportarDatos" class="btn-option">📤 Exportar datos</button>
          <button id="btnCerrarSesion" class="btn-option">🚪 Cerrar sesión</button>
          <button id="btnEliminarCuenta" class="btn-option danger">🗑️ Eliminar cuenta</button>
        </div>
      </div>
    </div>

    <!-- Modales (existentes) -->
    <div id="modalScanner" class="modal">
      <div class="modal-content scanner-modal">
        <div class="scanner-header">
          <h3>Escanear producto</h3>
          <button class="close-btn" id="closeScanner">&times;</button>
        </div>
        <div class="scanner-container">
          <video id="video" autoplay playsinline></video>
          <canvas id="canvas" style="display:none;"></canvas>
          <div class="scan-overlay">
            <div class="scan-frame"></div>
          </div>
        </div>
        <div class="scanner-footer">
          <button id="btnEscanearManual" class="btn-secondary">📝 Ingresar código manual</button>
        </div>
      </div>
    </div>

    <div id="modalManual" class="modal">
      <div class="modal-content small">
        <h3>Código de barras</h3>
        <input type="text" id="codigoManual" placeholder="Ingresa el código">
        <div class="modal-buttons">
          <button id="btnConfirmarManual" class="btn-primary">Confirmar</button>
          <button id="btnCancelarManual" class="btn-secondary">Cancelar</button>
        </div>
      </div>
    </div>

    <div id="modalProducto" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Registrar producto</h3>
        <form id="formProducto">
          <input type="hidden" id="codigoBarras">
          <div class="form-group">
            <label>Nombre del producto *</label>
            <input type="text" id="nombre" required autocomplete="off">
          </div>
          <div class="form-group">
            <label>Categoría</label>
            <select id="categoria">
              <option value="Alimentos">🥫 Alimentos</option>
              <option value="Bebidas">🥤 Bebidas</option>
              <option value="Limpieza">🧹 Limpieza</option>
              <option value="Frescos">🥬 Frescos</option>
              <option value="Congelados">❄️ Congelados</option>
              <option value="Otros">📦 Otros</option>
            </select>
          </div>
          <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="cantidad" value="1" step="0.5" min="0">
          </div>
          <div class="form-group">
            <label>Fecha de caducidad</label>
            <input type="date" id="fechaCaducidad">
          </div>
          <div class="form-group">
            <label>Ubicación en despensa</label>
            <select id="ubicacion">
              <option value="Estante 1">📌 Estante 1</option>
              <option value="Estante 2">📌 Estante 2</option>
              <option value="Estante 3">📌 Estante 3</option>
              <option value="Nevera">🧊 Nevera</option>
              <option value="Congelador">❄️ Congelador</option>
            </select>
          </div>
          <div class="modal-buttons">
            <button type="submit" class="btn-primary">Guardar</button>
            <button type="button" id="btnCancelarProducto" class="btn-secondary">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="modalAcciones" class="modal">
      <div class="modal-content small">
        <h3 id="accionesProductoNombre"></h3>
        <div class="acciones-buttons">
          <button id="btnConsumir" class="btn-action consume">✅ Consumir uno</button>
          <button id="btnAgregar" class="btn-action add">➕ Agregar stock</button>
          <button id="btnEditar" class="btn-action edit">✏️ Editar</button>
          <button id="btnEliminar" class="btn-action delete">🗑️ Eliminar</button>
        </div>
        <button id="btnCerrarAcciones" class="btn-secondary full-width">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/quagga@0.12.1/dist/quagga.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
